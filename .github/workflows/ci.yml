name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Verify compilation
        run: go build ./...

      - name: Run tests
        run: go test -v ./...

      - name: Run go vet
        run: go vet ./...
